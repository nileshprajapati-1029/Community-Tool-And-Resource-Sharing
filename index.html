<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Tool Sharing</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1f2937;
  color: white;
  padding: 15px 20px;
  flex-wrap: wrap;
}

.logo {
  font-size: 18px;
  font-weight: bold;
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 15px;
  align-items: center;
  flex-wrap: wrap;
}

.nav-links a {
  color: white;
  text-decoration: none;
}

.login-btn {
  padding: 8px 15px;
  background: #3b82f6;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 50px 20px;
  background: #f3f4f6;
}

.hero h1 {
  font-size: 2rem;
}

.hero button {
  margin-top: 15px;
  padding: 10px 20px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* SEARCH */
.filter {
  text-align: center;
  padding: 20px;
}

#searchBar {
  width: 90%;
  max-width: 400px;
  padding: 10px;
}

/* GRID */
.tool-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.tool-card {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
  background: white;
}

.tool-card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 8px;
}

.available {
  color: green;
}

.unavailable {
  color: red;
}

.request-btn {
  margin-top: 10px;
  padding: 8px 15px;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.request-btn:disabled {
  background: gray;
}

/* ABOUT */
.about {
  padding: 30px;
  text-align: center;
  background: #f9fafb;
}

/* FEEDBACK */
.feedback {
  padding: 30px;
  text-align: center;
}

.feedback input,
.feedback textarea {
  width: 90%;
  max-width: 400px;
  margin: 10px 0;
  padding: 10px;
}

.feedback button {
  padding: 10px 20px;
  background: #3b82f6;
  border: none;
  color: white;
  border-radius: 6px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  padding: 20px;
  max-width: 400px;
  margin: 10% auto;
  border-radius: 10px;
}

/* MOBILE */
@media (max-width: 768px) {

  .navbar {
    flex-direction: column;
    align-items: flex-start;
  }

  .nav-links {
    flex-direction: column;
    width: 100%;
    margin-top: 10px;
  }

  .hero h1 {
    font-size: 1.5rem;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <div class="logo">🔧 CTRS</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Tools</a></li>
      <li><a href="#">About</a></li>
      <button class="login-btn" onclick="loginUser()">Login</button>
    </ul>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Welcome to CTRS</h1>
  <p>Borrow & Share Tools Easily</p>
  <button onclick="handleShareClick()">Share Tool</button>
</section>

<!-- SEARCH -->
<section class="filter">
  <input type="text" id="searchBar" placeholder="Search tools..." oninput="filterTools()">
</section>

<!-- TOOLS -->
<section class="tool-list">

  <div class="tool-card">
    <img src="https://via.placeholder.com/200" />
    <h3>Hammer</h3>
    <p>Status: <span class="available">Available</span></p>
    <button class="request-btn">Request</button>
  </div>

  <div class="tool-card">
    <img src="https://via.placeholder.com/200" />
    <h3>Drill Machine</h3>
    <p>Status: <span class="unavailable">Unavailable</span></p>
    <button class="request-btn" disabled>Request</button>
  </div>

  <div class="tool-card">
    <img src="https://via.placeholder.com/200" />
    <h3>Cutter</h3>
    <p>Status: <span class="available">Available</span></p>
    <button class="request-btn">Request</button>
  </div>

</section>

<!-- ABOUT -->
<section class="about">
  <h2>Why Tool Sharing?</h2>
  <p>Save money, reduce waste, and help your community.</p>
</section>

<!-- FEEDBACK -->
<section class="feedback">
  <h2>Feedback</h2>
  <form id="feedbackForm">
    <input type="text" placeholder="Your Name" required>
    <textarea placeholder="Your Feedback" required></textarea>
    <button type="submit">Submit</button>
  </form>
  <p id="msg"></p>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Share Tool</h3>
    <input type="text" placeholder="Tool Name"><br><br>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

// LOGIN
function loginUser() {
  alert("Login Successful");
  localStorage.setItem("isLoggedIn", "true");
}

// SHARE BUTTON
function handleShareClick() {
  const isLoggedIn = localStorage.getItem("isLoggedIn") === "true";

  if (!isLoggedIn) {
    alert("Please login first");
  } else {
    document.getElementById("modal").style.display = "block";
  }
}

// CLOSE MODAL
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// SEARCH
function filterTools() {
  let input = document.getElementById("searchBar").value.toLowerCase();
  let cards = document.querySelectorAll(".tool-card");

  cards.forEach(card => {
    let name = card.querySelector("h3").textContent.toLowerCase();
    card.style.display = name.includes(input) ? "block" : "none";
  });
}

// FEEDBACK
document.getElementById("feedbackForm").addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("msg").textContent = "Thanks for feedback!";
  this.reset();
});

</script>

</body>
</html>
